# ApprenticeOps mission-control — LAN deployment (Docker on the home node).
#
# The container SSHes into the `home` node to read pipeline status and drive the
# run, and onward to `ai` for control. It therefore needs an SSH key + an ssh
# config that defines the `HOME_SSH` host (and `home` must itself reach
# `home-ai.home.domain` passwordlessly, which it already does).
#
# Mount the operator's ~/.ssh read-only. The key must be passphrase-less (or in a
# forwarded agent). Simplest: a dedicated key referenced by a Host block.
#
# LAN access: published on 0.0.0.0:8770 — reachable from the home network. Keep it
# on the trusted LAN; gate it with Authentik (AUTH_ENABLED=true) if you expose it
# through the ingress.
#
# Auth toggle:
#   AUTH_ENABLED=false → no auth (open on the LAN).
#   AUTH_ENABLED=true  → require the Authentik forward-auth header (AUTH_HEADER,
#                        default X-authentik-username). Put it behind the Authentik
#                        proxy/outpost so that header is injected; direct hits
#                        without it get 401.

services:
  mission-control:
    build: .
    image: apprenticeops/mission-control:0.6.0
    container_name: apprenticeops-mc
    restart: unless-stopped
    environment:
      HOME_SSH: ${HOME_SSH:-dragos@home.home.domain}
      AI_SSH: ${AI_SSH:-dragos@home-ai.home.domain}
      REPO_DIR: ${REPO_DIR:-/home/dragos/apprenticeops-main}
      POLL_S: "5"
      AUTH_ENABLED: ${AUTH_ENABLED:-false}
      AUTH_HEADER: ${AUTH_HEADER:-X-authentik-username}
    volumes:
      # read-only mount; the entrypoint copies it into a root-owned ~/.ssh with
      # the strict perms OpenSSH requires.
      - ${SSH_DIR:-${HOME}/.ssh}:/root/.ssh-src:ro
    ports:
      # 0.0.0.0 → LAN-accessible on the home network (host:container).
      - "${BIND:-0.0.0.0}:8770:8770"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8770/healthz',timeout=4).status==200 else 1)"]
      interval: 30s
      timeout: 6s
      retries: 3
      start_period: 10s
